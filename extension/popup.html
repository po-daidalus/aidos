<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px/1.4 system-ui, sans-serif; width: 320px; margin: 0; padding: 12px; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      .count { font-size: 28px; font-weight: 700; }
      .muted { color: #666; }
      button { font: inherit; padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; }
      button.primary { background: #1a7f4b; color: #fff; border-color: #1a7f4b; }
      .row { display: flex; gap: 6px; margin-top: 10px; }
      ul { margin: 8px 0 0; padding-left: 16px; max-height: 140px; overflow: auto; }
      li { margin: 2px 0; }
      hr { border: none; border-top: 1px solid #eee; margin: 14px 0; }
      h2 { font-size: 12px; text-transform: uppercase; color: #888; letter-spacing: .04em; margin: 0 0 6px; }
      textarea { width: 100%; height: 64px; font: 11px/1.3 monospace; border: 1px solid #ccc; border-radius: 6px; padding: 6px; resize: vertical; }
      .prog { font-size: 12px; color: #444; margin-top: 6px; }
    </style>
  </head>
  <body>
    <h1>aidos.de — Banner Collector</h1>
    <div><span class="count" id="count">0</span> <span class="muted">Treffer gesammelt</span></div>
    <ul id="list"></ul>
    <div class="row">
      <button class="primary" id="csv">Export CSV</button>
      <button id="json">Export JSON</button>
      <button id="clear">Leeren</button>
    </div>

    <hr />
    <h2>Auto-Loader</h2>
    <textarea id="urls" placeholder="Place-URLs einfügen (eine pro Zeile) — aus pipeline/out/candidate_urls.txt"></textarea>
    <div class="row">
      <button class="primary" id="start">Start</button>
      <button id="stop">Stop</button>
    </div>
    <div class="prog" id="prog"></div>

    <script src="popup.js"></script>
  </body>
</html>
